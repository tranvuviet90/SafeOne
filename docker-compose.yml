version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: safeone-db
    restart: always
    environment:
      MYSQL_DATABASE: safeone
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safeone-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: safeone
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_APIKEY: ${GOOGLE_APIKEY}
    volumes:
      - uploads_data:/usr/src/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
