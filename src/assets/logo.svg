<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 54" width="220" height="54">
  <!-- Circular Icon -->
  <g transform="translate(4, 0)">
    <!-- Outer Shield Circle -->
    <circle cx="27" cy="27" r="24" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" />
    
    <!-- Shield Shape Left Half -->
    <path d="M 27,10 Q 15,12 15,22 Q 15,36 27,44 Z" fill="#466E73" opacity="0.95" />
    <!-- Shield Shape Right Half -->
    <path d="M 27,10 Q 39,12 39,22 Q 39,36 27,44 Z" fill="#207335" opacity="0.95" />
    
    <!-- Human Body in Center -->
    <circle cx="27" cy="20" r="3.5" fill="#FFFFFF" />
    <path d="M 27,24.5 Q 23,28 23,37 L 27,37 Z" fill="#FFFFFF" />
    
    <!-- Leaf on the Right -->
    <path d="M 27,24.5 Q 33,26 33,33 C 33,37 29,37 27,37 Z" fill="#6EBF49" />
    <path d="M 27,28 Q 30,29 32,32" stroke="#FFFFFF" stroke-width="0.8" fill="none" />
  </g>
  
  <!-- Text SafeOne -->
  <text x="68" y="34" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#466E73">Safe</tspan><tspan fill="#207335">One</tspan>
  </text>
  
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#466E73" />
      <stop offset="100%" stop-color="#207335" />
    </linearGradient>
  </defs>
</svg>
