name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Syntax-check all backend modules
        run: |
          set -e
          node --check server.js
          for f in routes/*.js middleware/*.js socket/*.js config/*.js seed.js clean_db.js; do
            echo "checking $f"
            node --check "$f"
          done
