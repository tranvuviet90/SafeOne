# Nginx reverse proxy cho SafeOne (Ubuntu/Debian VPS).
#
# Cài đặt:
#   sudo cp deploy/nginx-safeone.conf /etc/nginx/sites-available/safeone
#   sudo ln -s /etc/nginx/sites-available/safeone /etc/nginx/sites-enabled/
#   # Sửa "safeone.example.com" thành tên miền thật của bạn (2 chỗ)
#   sudo nginx -t && sudo systemctl reload nginx
#
# Bật HTTPS miễn phí bằng Let's Encrypt (certbot tự sửa file này):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d safeone.example.com
#
# Sau khi có HTTPS, nhớ đặt trong backend/.env:
#   APP_BASE_URL=https://safeone.example.com
#   CORS_ORIGIN=https://safeone.example.com

server {
    listen 80;
    server_name safeone.example.com;

    # Cho phép upload file lớn (backend giới hạn 10MB/file + JSON batch 25MB)
    client_max_body_size 30m;

    # Nén để trang tải nhanh hơn
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO) cần header Upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Ảnh/tài liệu upload: cache 7 ngày ở trình duyệt
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }
}
